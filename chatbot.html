<script>
const localization = 'Pomezia (RM), Italy';
var time = new Date();
var hour = time.getHours();
var minute = time.getMinutes();
console.log(time);
const today = time.toLocaleString('it-IT', { dateStyle: 'full', timeStyle: 'short' });
let selfAwareness = null;        
        
        
const searchButton = document.getElementById("search-button");
searchButton.addEventListener("click", searchChat);

function searchChat() {
  const searchInput = document.getElementById("search-input");
  const searchTerm = searchInput.value.trim().toLowerCase();
  if (!searchTerm) return;
  const messageRows = document.querySelectorAll("#chathistory .message-row");
  messageRows.forEach((row) => {
    const contentEl = row.querySelector(".message-content");
    const messageText = contentEl ? contentEl.innerText.toLowerCase() : "";
    row.style.display = messageText.includes(searchTerm) ? "flex" : "none";
  });
  searchInput.value = "";
}
var saveButtont = document.getElementById("savetxt");
saveButtont.addEventListener("click", handleSaveButtontClick);

function handleSaveButtontClick() {
  saveChatContentTxt();
}

function saveChatContentTxt() {
  var chatContent = document.getElementById("chathistory").innerText;
  chatContent = chatContent.replace(/Copy/g, "");
  var currentTimestamp = new Date();
  var datetime = currentTimestamp.toISOString();
  var filename = "chatsession_v" + datetime.replace(/[-:.]/g, "");
  var blob = new Blob([chatContent], { type: "text/plain" });
  var url = URL.createObjectURL(blob);
  var downloadLink = document.createElement("a");
  downloadLink.href = url;
  downloadLink.download = filename + ".txt";
  downloadLink.click();
  URL.revokeObjectURL(url);
}
let chatMemory = [];
let currentFileId = null;
let currentFilename = null;

function createMemory(messages) {
  const memory = [];
  for (const msg of messages) {
    memory.push({ role: msg.role, content: msg.content });
  }
  return memory;
}
        
// MEMORY CONFIGURATION (Phase 4 - Advanced Features)
// 
// This configuration object controls the advanced memory management features:
//
// 1. COMPOSITE SCORING (4.1 - Ponderazione composita)
//    - Combines semantic similarity with temporal recency
//    - Formula: finalScore = (similarity * SIMILARITY_WEIGHT) + (recency * RECENCY_WEIGHT)
//    - Recency uses exponential decay over MAX_DAYS period
//    - Can be disabled with ENABLE_COMPOSITE_SCORING = false (falls back to similarity-only)
//
// 2. PARAMETERIZED PRUNING (4.2 - Configurazione pruning parametrizzabile)
//    - MAX_MEMORIES: Maximum number of memories to retain (default: 1500)
//    - MAX_DAYS: Maximum retention period in days (default: 365)
//    - SIMILARITY_THRESHOLD: Minimum composite score to include in results (default: 0.5)
//
// RETROCOMPATIBILITY: Set ENABLE_COMPOSITE_SCORING = false to use original behavior
// Runtime changes: Use updateMemoryConfig({...}) to modify settings dynamically
// View stats: Use displayMemoryStats() to see memory distribution and configuration
//
const MEMORY_CONFIG = {
  MAX_MEMORIES: 1500,        // Maximum number of memories to keep
  MAX_DAYS: 365,             // Maximum retention in days
  SIMILARITY_THRESHOLD: 0.5,  // Minimum similarity score to include memory
  SIMILARITY_WEIGHT: 0.7,     // Weight for semantic similarity (0-1)
  RECENCY_WEIGHT: 0.3,        // Weight for temporal recency (0-1)
  ENABLE_COMPOSITE_SCORING: true // Toggle for advanced weighting
};

// Ensure weights sum to 1
if (Math.abs(MEMORY_CONFIG.SIMILARITY_WEIGHT + MEMORY_CONFIG.RECENCY_WEIGHT - 1) > 0.001) {
  console.warn("Memory weights don't sum to 1. Normalizing...");
  const total = MEMORY_CONFIG.SIMILARITY_WEIGHT + MEMORY_CONFIG.RECENCY_WEIGHT;
  MEMORY_CONFIG.SIMILARITY_WEIGHT /= total;
  MEMORY_CONFIG.RECENCY_WEIGHT /= total;
}

// Calculate cosine similarity between two embedding vectors
function cosineSimilarity(a, b) {
  // Ensure both vectors have the same dimension (handle potential old 1536-dim vectors)
  const minLen = Math.min(a.length, b.length);
  const vecA = a.length > minLen ? a.slice(0, minLen) : a;
  const vecB = b.length > minLen ? b.slice(0, minLen) : b;
  
  const dot = vecA.reduce((sum, val, i) => sum + val * vecB[i], 0);
  const normA = Math.sqrt(vecA.reduce((sum, val) => sum + val * val, 0));
  const normB = Math.sqrt(vecB.reduce((sum, val) => sum + val * val, 0));
  return dot / (normA * normB);
}

// Calculate recency score using exponential decay (Phase 4 - 4.1)
// Returns 1.0 for new memories, decaying to 0.01 at maxDays
function calculateRecencyScore(memoryDate, maxDays = MEMORY_CONFIG.MAX_DAYS) {
  const now = new Date();
  const memoryTime = new Date(memoryDate);
  const ageInMs = now - memoryTime;
  const maxAgeInMs = maxDays * 24 * 60 * 60 * 1000;

  if (ageInMs < 0) return 1; // Future date, max score
  if (ageInMs >= maxAgeInMs) return 0; // Too old, min score

  // Exponential decay: newer memories have higher scores
  // Score = e^(-k * age), where k controls decay rate
  const k = -Math.log(0.01) / maxAgeInMs; // Ensures 1% score at max age
  return Math.exp(-k * ageInMs);
}

// Calculate composite score combining similarity and recency (Phase 4 - 4.1)
// If composite scoring is disabled, returns similarity score only (retrocompatible)
function calculateCompositeScore(similarityScore, recencyScore) {
  if (!MEMORY_CONFIG.ENABLE_COMPOSITE_SCORING) {
    return similarityScore;
  }
  return (similarityScore * MEMORY_CONFIG.SIMILARITY_WEIGHT) + 
         (recencyScore * MEMORY_CONFIG.RECENCY_WEIGHT);
}

// Get memory statistics including age distribution (Phase 4 - Utility)
function getMemoryStats() {
  const memoria = JSON.parse(localStorage.getItem("vivacityLongMemory") || "[]");
  const now = new Date();
  
  let memoryByAge = {
    recent: 0,    // < 7 days
    medium: 0,    // 7-30 days
    old: 0,       // 30-90 days
    veryOld: 0    // > 90 days
  };
  
  memoria.forEach(item => {
    const ageMs = now - new Date(item.data);
    const ageDays = ageMs / (24 * 60 * 60 * 1000);
    
    if (ageDays < 7) {
      memoryByAge.recent++;
    } else if (ageDays < 30) {
      memoryByAge.medium++;
    } else if (ageDays < 90) {
      memoryByAge.old++;
    } else {
      memoryByAge.veryOld++;
    }
  });
  
  return {
    total: memoria.length,
    maxAllowed: MEMORY_CONFIG.MAX_MEMORIES,
    maxDays: MEMORY_CONFIG.MAX_DAYS,
    compositeScoring: MEMORY_CONFIG.ENABLE_COMPOSITE_SCORING,
    similarityWeight: MEMORY_CONFIG.SIMILARITY_WEIGHT,
    recencyWeight: MEMORY_CONFIG.RECENCY_WEIGHT,
    threshold: MEMORY_CONFIG.SIMILARITY_THRESHOLD,
    byAge: memoryByAge
  };
}

// Update memory configuration at runtime (Phase 4 - Utility)
// Automatically normalizes weights if they don't sum to 1
function updateMemoryConfig(newConfig) {
  Object.assign(MEMORY_CONFIG, newConfig);
  
  // Ensure weights sum to 1 if changed
  if (newConfig.SIMILARITY_WEIGHT !== undefined || newConfig.RECENCY_WEIGHT !== undefined) {
    if (Math.abs(MEMORY_CONFIG.SIMILARITY_WEIGHT + MEMORY_CONFIG.RECENCY_WEIGHT - 1) > 0.001) {
      console.warn("Memory weights don't sum to 1. Normalizing...");
      const total = MEMORY_CONFIG.SIMILARITY_WEIGHT + MEMORY_CONFIG.RECENCY_WEIGHT;
      MEMORY_CONFIG.SIMILARITY_WEIGHT /= total;
      MEMORY_CONFIG.RECENCY_WEIGHT /= total;
    }
  }
  
  console.log("Memory configuration updated:", MEMORY_CONFIG);
  
  // Update UI display
  const mem = JSON.parse(localStorage.getItem("vivacityLongMemory") || "[]");
  document.getElementById("memoryStatus").innerText = 
    `Long memory: ${mem.length} memories saved (max ${MEMORY_CONFIG.MAX_MEMORIES}, ${MEMORY_CONFIG.MAX_DAYS} days retention)`;
  
  return MEMORY_CONFIG;
}

// Save conversation to long-term memory with embedding (uses config from Phase 4)
async function saveToLongMemory(userInput, botResponse, target = 'local') {
  const apikey = localStorage.getItem("openaikey");
  const testo = `Utente: ${userInput}\nBot: ${botResponse}`;
  try {
    const res = await fetch("https://api.openai.com/v1/embeddings", {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: "Bearer " + apikey },
      body: JSON.stringify({ model: "text-embedding-3-small", input: testo, dimensions: 512 })
    });
    const data = await res.json();
    if (!data.data || !data.data[0]) throw new Error("Embedding failed");
    const vettore = data.data[0].embedding.map(v => Number(v.toFixed(5)));
    const memoryObj = { testo, vettore, data: new Date().toISOString() };

    if (target === 'local' || target === 'both') {
      const memoria = JSON.parse(localStorage.getItem("vivacityLongMemory") || "[]");
      const exists = memoria.some(item => item.testo === memoryObj.testo);
      if (!exists) {
        memoria.push(memoryObj);
        localStorage.setItem("vivacityLongMemory", JSON.stringify(memoria));
      }
    }

    if (target === 'server' || target === 'both') {
      await fetch("saveMemory.php", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(memoryObj)
      });
    }
  } catch (e) { console.error("saveToLongMemory error:", e); }
}

// Search long-term memory using composite scoring (Phase 4 - 4.1)
// Combines semantic similarity and temporal recency with configurable weights
async function searchLongMemory(query, topK = 3) {
  const apikey = localStorage.getItem("openaikey");
  let memoria = JSON.parse(localStorage.getItem("vivacityLongMemory") || "[]");

  // Fetch server memory
  try {
    const serverRes = await fetch("getMemory.php");
    if (serverRes.ok) {
      const serverMemoria = await serverRes.json();
      if (Array.isArray(serverMemoria)) {
        // Merge and deduplicate by 'testo'
        const existingTexts = new Set(memoria.map(m => m.testo));
        serverMemoria.forEach(item => {
          // Normalization to 512 dimensions and 5 decimal places
          if (item.vettore) {
            if (item.vettore.length > 512) {
              item.vettore = item.vettore.slice(0, 512);
            }
            item.vettore = item.vettore.map(v => Number(v.toFixed(5)));
          }
          if (!existingTexts.has(item.testo)) {
            memoria.push(item);
            existingTexts.add(item.testo);
          }
        });
      }
    }
  } catch (e) {
    console.error("Error fetching server memory:", e);
  }

  if (memoria.length === 0) return "";
  try {
    const res = await fetch("https://api.openai.com/v1/embeddings", {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: "Bearer " + apikey },
      body: JSON.stringify({ model: "text-embedding-3-small", input: query, dimensions: 512 })
    });
    const data = await res.json();
    const queryVettore = data.data[0].embedding.map(v => Number(v.toFixed(5)));
    const risultati = memoria
      .map(item => {
        const similarityScore = cosineSimilarity(queryVettore, item.vettore);
        const recencyScore = calculateRecencyScore(item.data);
        const compositeScore = calculateCompositeScore(similarityScore, recencyScore);
        return {
          testo: item.testo,
          data: item.data,
          similarityScore,
          recencyScore,
          compositeScore
        };
      })
      .filter(item => item.compositeScore >= MEMORY_CONFIG.SIMILARITY_THRESHOLD)
      .sort((a, b) => b.compositeScore - a.compositeScore)
      .slice(0, topK);
    
    if (risultati.length === 0) return "";
    
    console.log(`Found ${risultati.length} relevant memories. Top scores:`, 
      risultati.map(r => ({ composite: r.compositeScore.toFixed(3), similarity: r.similarityScore.toFixed(3), recency: r.recencyScore.toFixed(3) })));
    
    return "Relevant memories from past conversations:\n" + risultati.map(r => `[${r.data}] ${r.testo}`).join("\n---\n");
          
  } catch (e) { console.error("searchLongMemory error:", e); return ""; }
}

async function searchBiography(query) {

  try {

}

// CORE FUNCTION - openAIChat
async function openAIChat(userMessage, options, chatMemory) {
  const apikey = localStorage.getItem("openaikey");
  document.getElementById("apikey").value = apikey;
  if (apikey === "") { alert("No OpenAI API Key found."); return chatMemory; }

  showSpinner(options.spinnerMessage || "Processing...");

  // Gestione memoria a lungo termine e biografia dinamica
  const userTextQuery = typeof userMessage === 'string' 
    ? userMessage 
    : (typeof userMessage.content === 'string' 
        ? userMessage.content 
        : (userMessage.content?.[0]?.text || ""));
  let dynamicContext = "";

  if (options.searchMemory !== false && options.searchMemory !== undefined) {
    const contestoMemoria = await searchLongMemory(userTextQuery);
    if (contestoMemoria) {
      dynamicContext += "\n\n" + contestoMemoria;
      console.log("Memory context retrieved");
    }
  }

  // Bio Retrieval Dinamico
  const contestoBio = await searchBiography(userTextQuery);
  if (contestoBio) {
    dynamicContext += "\n\n" + contestoBio;
    console.log("Bio context retrieved");
  }

  try {
    // Creazione messaggi per la richiesta con prompt di sistema arricchito (senza alterare la memoria permanente)
    const messagesForRequest = [...chatMemory];
    if (messagesForRequest.length > 0 && messagesForRequest[0].role === 'system' && dynamicContext) {
      messagesForRequest[0] = { 
        ...messagesForRequest[0], 
        content: messagesForRequest[0].content + dynamicContext 
      };
    }

    const requestBody = {
      model: options.model,
      messages: [...messagesForRequest, userMessage],
      max_tokens: options.maxTokens || 15999
    };

    // Aggiungi web_search_options per ricerca web
    if (options.webSearch) {
      requestBody.web_search_options = { search_context_size: "medium" };
    }

    const response = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: "Bearer " + apikey },
      body: JSON.stringify(requestBody)
    });

    if (!response.ok) throw new Error("Error while requesting to the API");
    const data = await response.json();
    if (!data.choices || !data.choices.length || !data.choices[0].message || !data.choices[0].message.content)
      throw new Error("Invalid API response");

    const rawResponse = data.choices[0].message.content.trim();
    
    // Response cleaning
    let cleanResponse = rawResponse
      .replace(/(```html|```css|```javascript|```json|```js|```php|```python|```vb|```vbnet|```cpp|```java|```csharp)(.*?)/gs, "$2")
      .replace(/```/g, "")
      .replace(/\*\*(.*?)\*\*/g, "$1")
      .replace(/^#{1,6}\s*(.+)$/gm, "$1");

    // Calcolo costi token
    let tokenInfo = "";
    if (data.usage?.completion_tokens) {
      const { prompt_tokens, completion_tokens, total_tokens } = data.usage;
      const promptPrice = (options.tokenPrices?.prompt || 0) / 1000000;
      const responsePrice = (options.tokenPrices?.response || 0) / 1000000;
      const promptCost = promptPrice * prompt_tokens;
      const responseCost = responsePrice * completion_tokens;
      const totalExpense = promptCost + responseCost;
      
      if (options.webSearch) {
        tokenInfo = `Your request used ${prompt_tokens} tokens and cost ${promptCost.toFixed(6)}USD<br>` +
          `This response used ${completion_tokens} tokens and cost ${responseCost.toFixed(6)}USD<br>` +
          `Total Tokens: ${total_tokens}. This interaction cost you: ${totalExpense.toFixed(6)}USD.`;
      } else {
        tokenInfo = `<hr>Your request used ${prompt_tokens} tokens and costed ${promptCost.toFixed(6)}USD<br>` +
          `This response used ${completion_tokens} tokens and costed ${responseCost.toFixed(6)}USD<br>` +
          `Total Tokens: ${total_tokens}. This interaction costed you: ${totalExpense.toFixed(6)}USD.`;
      }
    } else {
      tokenInfo = "Unable to track the number of used tokens.";
    }

    // Gestione citazioni per web search
    let citationLinks = [];
    if (options.webSearch) {
      const citations = data.choices[0].message.annotations || [];
      if (citations.length > 0) {
        citations.forEach(annotation => {
          if (annotation.type === 'url_citation' && annotation.url_citation) {
            const { title, url } = annotation.url_citation;
            citationLinks.push({ title, url });
          }
        });
      }
      // Clean response text for web
      cleanResponse = cleanResponseText(cleanResponse, citations);
    }

    // Aggiornamento chatMemory
    const userContent = typeof userMessage === 'string' ? userMessage : 
      (typeof userMessage.content === 'string' ? userMessage.content : 
      (userMessage.content?.[0]?.text || JSON.stringify(userMessage.content)));
    chatMemory.push({ role: "user", content: userContent });
    chatMemory.push({ role: "assistant", content: cleanResponse });

    /* AUTOMATIC SAVE DISABLED - Now manual via UI
    if (!options.webSearch) {
      await saveToLongMemory(userContent, cleanResponse);
    }
    */

    // Display message in base al tipo
    if (options.webSearch) {
      showMessageWeb("Digital Clone", cleanResponse, citationLinks, tokenInfo, userContent);
    } else if (options.showPreview && options.imageUrl) {
      // Image preview display
      const wrapperFlex = document.createElement("div");
      wrapperFlex.style.width = "100%";
      wrapperFlex.style.display = "flex";
      wrapperFlex.style.alignItems = "flex-start";
      wrapperFlex.style.gap = "10px";
      wrapperFlex.style.marginBottom = "10px";
      
      const imageFrame = document.createElement("div");
      imageFrame.style.width = "20%";
      imageFrame.style.height = "auto";
      imageFrame.style.textAlign = "center";
      imageFrame.style.fontSize = ".9rem";
      imageFrame.style.display = "flex";
      imageFrame.style.flexDirection = "column";
      imageFrame.style.justifyContent = "center";
      imageFrame.style.alignItems = "center";
      imageFrame.style.boxShadow = "0 4px 8px black";
      imageFrame.style.borderRadius = "8px";
      imageFrame.innerHTML = "Uploaded Image";
      
      const imagePreview = document.createElement("img");
      imagePreview.src = options.imageUrl;
      imagePreview.style.maxWidth = "95%";
      imagePreview.style.marginTop = "10px";
      imagePreview.style.marginBottom = "8px";
      imagePreview.style.borderRadius = "8px";
      imagePreview.style.height = "auto";
      imagePreview.alt = "Uploaded Image preview";
      imageFrame.appendChild(imagePreview);
      wrapperFlex.appendChild(imageFrame);
      
      const chatContainer = document.getElementById("chathistory");
      chatContainer.appendChild(wrapperFlex);
      
      showMessage(
        "Digital Clone",
        "Here is a summary of the analyzed image: \n\n" + cleanResponse + "\n\n Now you can ask me questions about the content.",
        tokenInfo,
        userContent
      );
      
      const chatMessages = chatContainer.querySelectorAll("#chathistory > div");
      const lastMessage = chatMessages[chatMessages.length - 1];
      wrapperFlex.appendChild(lastMessage);
    } else {
      showMessage("Digital Clone", cleanResponse, tokenInfo, userContent);
    }

    return chatMemory;

  } catch (error) {
    console.error(error);
    alert("An error occurred during the request. Check your OpenAI account or retry later.");
    return chatMemory;
  } finally {
    hideSpinner();
  }
}

    ? {

        content: [
          { type: "text", text: userInput },
          { type: "file", file: { file_id: currentFileId } }
        ]
      }
    : { role: "user", content: userInput };

  const options = {
    model: 'gpt-4.1-mini',
    searchMemory: true,

function cleanResponseText(response, citations) {
  const citationUrls = citations
    .filter(a => a.type === 'url_citation' && a.url_citation && a.url_citation.url)
    .map(a => a.url_citation.url);
  let cleanedResponse = response;
  citationUrls.forEach(url => {
    const urlRegex = new RegExp(url.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
    cleanedResponse = cleanedResponse.replace(urlRegex, '');
  });
  cleanedResponse = cleanedResponse.replace(/https?:\/\/[^\s]+/g, '');
  cleanedResponse = cleanedResponse
    .replace(/[ ]{2,}/g, ' ')
    .replace(/\.\s+/g, '.<br>');
  cleanedResponse = cleanedResponse.replace(/\(\[[^\]]+\]\(\)\)/g, '');
  return cleanedResponse.trim();
}

async function uploadToOpenAI(file) {
  const apikey = localStorage.getItem("openaikey");
  if (!apikey) {
    alert("No OpenAI API Key found.");
    return null;
  }
  if (file.size > 20 * 1024 * 1024) {
    alert("File too large (>20 MB): please reduce its size before uploading.");
    return null;
  }
  const formData = new FormData();
  formData.append("file", file);
  formData.append("purpose", "assistants");
  showSpinner("Uploading file to OpenAI...");
  try {
    const response = await fetch("https://api.openai.com/v1/files", {
      method: "POST",
      headers: { Authorization: "Bearer " + apikey },
      body: formData
    });
    if (!response.ok) {
      const errText = await response.text();
      throw new Error(errText);
    }
    const data = await response.json();
    console.log("OpenAI file upload OK:", data);
    return data;
  } catch (err) {
    console.error("Upload error:", err);
    alert("Error during upload: " + err.message);
    return null;
  } finally {
    hideSpinner();
  }
}

async function analyzeFile() {

  const feedbackEl = document.getElementById("feedback");

  if (!fileInput.files || fileInput.files.length === 0) {
    alert("Please select a file first!");
    return;
  }

  const file = fileInput.files[0];
  const filename = file.name;
  const mimeType = file.type;

  const openAISupportedTypes = [
    "application/pdf",
    "image/jpeg", "image/png", "image/gif", "image/webp"
  ];

  if (currentFileId) {
    await deleteOpenAIFile(currentFileId);
    currentFileId = null;
    currentFilename = null;
  }

  chatMemory = [];
  feedbackEl.innerHTML = "Uploading...";

  const isOpenAISupported = openAISupportedTypes.includes(mimeType);

  if (isOpenAISupported) {
    const uploaded = await uploadToOpenAI(file);
    if (!uploaded) { feedbackEl.innerHTML = "Upload failed."; return; }
    currentFileId = uploaded.id;
    currentFilename = filename;
    feedbackEl.innerHTML = `File <strong>${filename}</strong> uploaded. Analyzing...`;
    await analyzeOpenAIFile(currentFileId, filename);

  } else {
    feedbackEl.innerHTML = `Reading <strong>${filename}</strong>...`;
    const textContent = await readFileAsText(file);
    if (!textContent) { feedbackEl.innerHTML = "Could not read file."; return; }
    currentFilename = filename;
    feedbackEl.innerHTML = `File <strong>${filename}</strong> read. Analyzing...`;
    await analyzeTextFile(textContent, filename);

    <br><button class="btn btn-secondary" onclick="closeDocument()" style="margin-top:6px;">&#128473; Close document</button>
  `;

function readFileAsText(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = () => reject(null);
    reader.readAsText(file, "UTF-8");
  });
}

async function analyzeTextFile(textContent, filename) {
  const apikey = localStorage.getItem("openaikey");
  if (!apikey) { alert("No OpenAI API Key found."); return; }

  showSpinner("Analyzing " + filename + "...");

  const maxChars = 60000;
  const truncated = textContent.length > maxChars;
  const safeContent = truncated ? textContent.substring(0, maxChars) + "\n\n[...content truncated...]" : textContent;

  try {
    const response = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + apikey
      },
      body: JSON.stringify({
        model: "gpt-4.1-mini",
        messages: [
          {
            role: "user",
            content: `Today is ${today} and the location is ${localization}. Please provide a complete and detailed summary of the following file named "${filename}". After the summary, highlight the main topics, key points, and any relevant data or conclusions.\n\nFILE CONTENT:\n\`\`\`\n${safeContent}\n\`\`\``
          }
        ],
        max_tokens: 4096
      })
    });

    if (!response.ok) {
      const errText = await response.text();
      throw new Error(errText);
    }

    const data = await response.json();
    let rawResponse = "";
    const choice = data.choices?.[0]?.message?.content;
    if (Array.isArray(choice)) {
      rawResponse = choice.map(c => c.text || "").join(" ");
    } else if (typeof choice === "string") {
      rawResponse = choice;
    } else {
      throw new Error("Invalid API response");
    }

    const cleanResponse = rawResponse
      .replace(/(```html|```css|```javascript|```json|```js|```php|```python|```vb|```vbnet|```cpp|```java|```csharp)(.*?)/gs, "$2")
      .replace(/```/g, "")
      .replace(/\*\*(.*?)\*\*/g, "$1")
      .replace(/^#{1,6}\s*(.+)$/gm, "$1");

    const tokenCount = document.createElement("p");
    if (data.usage?.completion_tokens) {
      const { prompt_tokens, completion_tokens, total_tokens } = data.usage;
      const cost = (prompt_tokens * 0.40 + completion_tokens * 1.60) / 1000000;
      tokenCount.innerHTML = `<hr>Used ${prompt_tokens} prompt + ${completion_tokens} response tokens — Cost: ${cost.toFixed(6)} USD`;
    }

    const userPrompt = `[Document uploaded: "${filename}". Content:\n\`\`\`\n${safeContent}\n\`\`\`]`;
    showMessage(
      "Digital Clone",
      `Here is a summary of the analyzed file "${filename}":\n\n` + cleanResponse + "\n\nNow you can ask me questions about the content.",
      tokenCount.innerHTML,
      userPrompt
    );

    chatMemory.push({ role: "user", content: userPrompt });
    chatMemory.push({ role: "assistant", content: cleanResponse });

  } catch (error) {
    console.error("Analysis error:", error);
    alert("An error occurred during analysis: " + error.message);
  } finally {
    hideSpinner();
  }
}

  const apikey = localStorage.getItem("openaikey");
  if (!apikey) { alert("No OpenAI API Key found."); return; }

  showSpinner("Analyzing " + filename + "...");

  try {
    const response = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + apikey
      },

          {
            role: "user",
            content: [
              {
                type: "text",
                text: `Today is ${today} and the location ${localization} is Please provide a complete and detailed summary of the following file named "${filename}". After the summary, also highlight the main topics, key points, and any relevant data or conclusions present in the document.`
              },
              {
                type: "file",
                file: {
                  file_id: fileId
                }
              }
            ]
          }
        ],
        max_tokens: 4096
      })
    });

    if (!response.ok) {
      const errText = await response.text();
      throw new Error(errText);
    }

    const data = await response.json();

    let rawResponse = "";
    const choice = data.choices?.[0]?.message?.content;
    if (Array.isArray(choice)) {
      rawResponse = choice.map(c => c.text || "").join(" ");
    } else if (typeof choice === "string") {
      rawResponse = choice;
    } else {
      throw new Error("Invalid API response");
    }

    const cleanResponse = rawResponse
      .replace(/(```html|```css|```javascript|```json|```js|```php|```python|```vb|```vbnet|```cpp|```java|```csharp)(.*?)/gs, "$2")
      .replace(/```/g, "")
      .replace(/\*\*(.*?)\*\*/g, "$1")
      .replace(/^#{1,6}\s*(.+)$/gm, "$1");

    const tokenCount = document.createElement("p");
    if (data.usage && data.usage.completion_tokens) {
      const requestTokens = data.usage.prompt_tokens;
      const responseTokens = data.usage.completion_tokens;
      const totalTokens = data.usage.total_tokens;
      const pricepertokenprompt = 0.40 / 1000000;
      const pricepertokenresponse = 1.60 / 1000000;
      const priceperrequest = pricepertokenprompt * requestTokens;
      const priceperresponse = pricepertokenresponse * responseTokens;
      const totalExpense = priceperrequest + priceperresponse;
      tokenCount.innerHTML = `<hr>File analysis used ${requestTokens} prompt tokens (${priceperrequest.toFixed(6)}USD) and ${responseTokens} response tokens (${priceperresponse.toFixed(6)}USD)<br>Total: ${totalTokens} tokens — This interaction costed you: ${totalExpense.toFixed(6)}USD.`;
    } else {
      tokenCount.innerHTML = "Unable to track the number of used tokens.";
    }

    const userPrompt = `[Document uploaded: "${filename}". Please answer questions about it.]`;
    showMessage(
      "Digital Clone",
      `Here is a summary of the analyzed file "${filename}":\n\n` + cleanResponse + "\n\nNow you can ask me questions about the content.",
      tokenCount.innerHTML,
      userPrompt
    );

    chatMemory.push({ role: "user", content: userPrompt });
    chatMemory.push({ role: "assistant", content: cleanResponse });

  } catch (error) {
    console.error("Analysis error:", error);
    alert("An error occurred during analysis: " + error.message);
  } finally {
    hideSpinner();
  }
}

function exportAllMemory() {

// Prune old memories using configurable parameters (Phase 4 - 4.2)
// Removes memories older than maxDaysOld and limits total count to maxItems
function pruneOldMemories(maxItems = MEMORY_CONFIG.MAX_MEMORIES, maxDaysOld = MEMORY_CONFIG.MAX_DAYS) {
  const memoria = JSON.parse(localStorage.getItem("vivacityLongMemory") || "[]");
  const now = new Date();
  const cutoff = new Date(now.getTime() - (maxDaysOld * 24 * 60 * 60 * 1000));
  
  const originalCount = memoria.length;
  
  // Filter by time first (remove old memories)
  let pruned = memoria.filter(item => new Date(item.data) > cutoff);
  const timeFilteredCount = pruned.length;
  
  // Then apply count limit (remove oldest beyond maxItems)
  if (pruned.length > maxItems) {
    pruned = pruned.slice(pruned.length - maxItems);
  }
  
  const finalCount = pruned.length;
  
  localStorage.setItem("vivacityLongMemory", JSON.stringify(pruned));
  
  console.log(`Memory pruning complete: ${originalCount} -> ${finalCount} memories`);
  console.log(`  Removed ${originalCount - timeFilteredCount} old memories (> ${maxDaysOld} days)`);
  console.log(`  Removed ${timeFilteredCount - finalCount} excess memories (> ${maxItems} total)`);
  
  return {
    original: originalCount,
    timeFiltered: timeFilteredCount,
    final: finalCount,
    removedByTime: originalCount - timeFilteredCount,
    removedByCount: timeFilteredCount - finalCount
  };
}

async function syncServerMemory() {
    let localMemoria = JSON.parse(localStorage.getItem("vivacityLongMemory") || "[]");
    try {
        const serverRes = await fetch("getMemory.php");
        if (serverRes.ok) {
            const serverMemoria = await serverRes.json();
            if (Array.isArray(serverMemoria)) {
                const existingTexts = new Set(localMemoria.map(m => m.testo));
                let added = 0;
                serverMemoria.forEach(item => {
                    // Normalization to 512 dimensions and 5 decimal places
                    if (item.vettore) {
                        if (item.vettore.length > 512) {
                            item.vettore = item.vettore.slice(0, 512);
                        }
                        item.vettore = item.vettore.map(v => Number(v.toFixed(5)));
                    }
                    if (!existingTexts.has(item.testo)) {
                        localMemoria.push(item);
                        existingTexts.add(item.testo);
                        added++;
                    }
                });
                if (added > 0) {
                    localStorage.setItem("vivacityLongMemory", JSON.stringify(localMemoria));
                }
                
                // Update UI
                const total = localMemoria.length;
                document.getElementById("memoryStatus").innerText = 
                    `Long memory: ${total} saved memories (max ${MEMORY_CONFIG.MAX_MEMORIES}, ${MEMORY_CONFIG.MAX_DAYS} days retention)`;
                
                alert(`Synchronization complete. ${added} new memories retrieved from server. Total: ${total}`);
            }
        } else {
            alert("Error retrieving memory from server.");
        }
    } catch (e) {
        console.error("Sync error:", e);
        alert("An error occurred during synchronization.");
    }
}

document.addEventListener("DOMContentLoaded", async function () {

  // Prima di tutto: carica selfAwareness dal file esterno
  try {
    const response = await fetch('self_awareness.txt');
    if (!response.ok) throw new Error('File not found');
    selfAwareness = await response.text();
  } catch (error) {
    console.error('Error loading self_awareness.txt:', error);
  }

  await updateStructure();
  
  console.log("=== MEMORY SYSTEM INITIALIZATION ===");
  console.log("Phase 4 Features: Composite Scoring & Advanced Pruning");
  console.log("Configuration:", MEMORY_CONFIG);
  
  // Migration for old embeddings (1536 -> 512) and rounding
  const existingMem = JSON.parse(localStorage.getItem("vivacityLongMemory") || "[]");
  let migrated = false;
  existingMem.forEach(item => {
    if (item.vettore) {
      const originalLen = item.vettore.length;
      const originalJSON = JSON.stringify(item.vettore);
      if (originalLen > 512) item.vettore = item.vettore.slice(0, 512);
      item.vettore = item.vettore.map(v => Number(v.toFixed(5)));
      if (originalLen !== item.vettore.length || JSON.stringify(item.vettore) !== originalJSON) migrated = true;
    }
  });
  if (migrated) {
    localStorage.setItem("vivacityLongMemory", JSON.stringify(existingMem));
    console.log("LocalStorage memory migrated to 512 dimensions and 5 decimal places.");
  }
  
  const pruneResult = pruneOldMemories();
  console.log("Pruning result:", pruneResult);
  
  await initSelfAwareness();
  
  const mem = JSON.parse(localStorage.getItem("vivacityLongMemory") || "[]");
  document.getElementById("memoryStatus").innerText = 
    `Long memory: ${mem.length} saved memories (max ${MEMORY_CONFIG.MAX_MEMORIES}, ${MEMORY_CONFIG.MAX_DAYS} days retention)`;
  
  displayMemoryStats();
  
  console.log("You can use displayMemoryStats() to view memory statistics anytime.");
  console.log("You can use updateMemoryConfig({...}) to change settings at runtime.");
  console.log("Example: updateMemoryConfig({ SIMILARITY_WEIGHT: 0.8, RECENCY_WEIGHT: 0.2 })");
});
</script>
